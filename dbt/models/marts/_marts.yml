version: 2

models:
  - name: games
    description: One row per game in warehouse Statcast data (all seasons and game types loaded).
    config:
      materialized: table
    columns:
      - name: game_pk
        tests: [not_null, unique]
      - name: game_date
        tests: [not_null]
      - name: home_team
        tests: [not_null]
      - name: away_team
        tests: [not_null]

  - name: game_coverage
    description: >
      One row per game_pk from the union of mlb_schedule and Statcast-derived games.
      Schedule rows with detailed_state Cancelled are excluded.
      Use coverage_status = missing_data (or has_statcast_data = false and in_schedule = true)
      to list scheduled games without Statcast data.
    columns:
      - name: game_pk
        tests: [not_null, unique]
      - name: calendar_date
        tests: [not_null]
      - name: coverage_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['covered', 'missing_data', 'data_only']

  - name: daily_game_coverage
    description: >
      Per calendar day and game type, compares games present in Statcast-derived games
      against games in the MLB Stats API mlb_schedule ingest (Cancelled games excluded).
    columns:
      - name: calendar_date
        tests: [not_null]
      - name: game_type
        tests: [not_null]
      - name: season_year
        tests: [not_null]
      - name: games_with_data
        tests: [not_null]
      - name: games_scheduled
        tests: [not_null]
      - name: data_minus_scheduled
        tests: [not_null]

  - name: statcast_events
    description: >
      Pitch-level Statcast rows enriched with Savant gamefeed fields from statcast_extra.
      Joined on game_pk, at_bat_number (= ab_number), and pitch_number.
    config:
      tags: ["post_statcast_extra_ingest"]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - game_pk
              - at_bat_number
              - pitch_number
    columns:
      - name: game_pk
        tests: [not_null]
      - name: at_bat_number
        tests: [not_null]
      - name: pitch_number
        tests: [not_null]
      - name: has_statcast_extra
        tests: [not_null]

  - name: abs_challenges
    description: >
      ABS challenge pitches from statcast_extra (is_abs_challenge = true), with challenge
      fields unprefixed and minimal pitch context for joining back to statcast_events.
    config:
      tags: ["post_statcast_extra_ingest"]
    columns:
      - name: game_pk
        tests: [not_null]
      - name: play_id
        tests: [not_null, unique]
      - name: ab_number
        tests: [not_null]
      - name: pitch_number
        tests: [not_null]
      - name: challenge_outcome
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['overturned', 'confirmed', 'pending']

  - name: current_season_batting_stats
    description: >
      Current-season batting leaderboard (replaces warehouse materialized view of the same name).
      Logic ported from query.prql; add dbt vars later for API-style filters (date range, qualified, platoon, etc.).
    columns:
      - name: player_id
        tests: [not_null, unique]
      - name: woba
        tests: [not_null]
