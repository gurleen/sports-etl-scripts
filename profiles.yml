# Committed profile: secrets via env vars (same as etl_scripts/statcast.py).
# Override location with DBT_PROFILES_DIR or ~/.dbt/profiles.yml if you prefer.

etl_scripts:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'postgres') }}"
      schema: baseball
      # Build one model at a time: each pbp mart is a heavy DuckDB aggregation and
      # the Postgres VPS only has 2 GB RAM, so concurrent models OOM/thrash.
      threads: 1
    # Local DuckDB file for testing: same `public`-schema source layout as prod
    # (load via ETL_DB_BACKEND=duckdb), marts build into the `baseball` schema.
    local:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', 'dev.duckdb') }}"
      schema: baseball
      threads: 4
