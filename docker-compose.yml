# Self-hosted Prefect: UI + API, Postgres metadata DB, process worker for this repo.
# Set DATABASE_URL when starting so flows can reach your warehouse (see docs/orchestration.md).
services:
  prefect-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - prefect-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 5s
      timeout: 5s
      retries: 10

  prefect-server:
    image: prefecthq/prefect:3-python3.11
    depends_on:
      prefect-db:
        condition: service_healthy
    # Optional: PREFECT_UI_API_URL in .env so the browser calls your public API (tunnel / HTTPS).
    env_file:
      - path: .env
        required: false
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@prefect-db:5432/prefect
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
    command: >
      sh -c "prefect server database upgrade --yes &&
             prefect server start --host 0.0.0.0"
    ports:
      - "4200:4200"

  prefect-worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - prefect-server
    # Pass secrets without Compose ${...} interpolation (breaks URLs with $, #, etc.).
    env_file:
      - path: .env
        required: false
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_LOGGING_LEVEL: INFO
      ETL_REPO_ROOT: /app
      PYTHONPATH: /app
    command: prefect worker start --pool etl-pool --type process
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  prefect-db-data:
