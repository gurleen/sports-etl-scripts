# Secrets (Repository secrets):
#   SSH_PRIVATE_KEY   — PEM private key for the deploy user (full key including headers)
#   SSH_KNOWN_HOSTS   — Optional. One or more lines from `ssh-keyscan your.host`
#                       (recommended). If omitted, StrictHostKeyChecking=accept-new is used.
#   HOST              — VPS hostname or IP
#   USER              — SSH username (e.g. ubuntu)
#   APP_DIRECTORY     — Absolute path to the clone on the server (e.g. /home/ubuntu/etl-scripts)
#
# Deploy runs scripts/docker_deploy.sh on the VPS (git pull, conditional worker rebuild, compose up).
# BuildKit must be enabled for Dockerfile cache mounts (DOCKER_BUILDKIT / COMPOSE_DOCKER_CLI_BUILD).

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - name: Deploy over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          DEPLOY_HOST: ${{ secrets.HOST }}
          DEPLOY_USER: ${{ secrets.USER }}
          APP_DIRECTORY: ${{ secrets.APP_DIRECTORY }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing secret SSH_PRIVATE_KEY" >&2
            exit 1
          fi
          if [ -z "${DEPLOY_HOST:-}" ] || [ -z "${DEPLOY_USER:-}" ] || [ -z "${APP_DIRECTORY:-}" ]; then
            echo "Set repository secrets HOST, USER, and APP_DIRECTORY" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
            HOST_KEY_OPTS="-o StrictHostKeyChecking=yes"
          else
            HOST_KEY_OPTS="-o StrictHostKeyChecking=accept-new"
          fi

          REMOTE_CMD=$(cat <<EOF
          set -euo pipefail
          export DOCKER_BUILDKIT=${DOCKER_BUILDKIT}
          export COMPOSE_DOCKER_CLI_BUILD=${COMPOSE_DOCKER_CLI_BUILD}
          cd "${APP_DIRECTORY}"
          git pull --ff-only
          if [ ! -f scripts/docker_deploy.sh ]; then
            echo "Missing scripts/docker_deploy.sh after git pull." >&2
            exit 1
          fi
          chmod +x scripts/docker_deploy.sh
          exec bash scripts/docker_deploy.sh
          EOF
          )

          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            $HOST_KEY_OPTS \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "$REMOTE_CMD"
